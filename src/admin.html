<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - PalmStar</title>
    <link rel="stylesheet" href="../static/css/styles.css" />
    <link
      rel="shortcut icon"
      href="../static/img/palmstar-logo.png"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      .submission-card {
        transition: transform 0.2s;
      }
      .submission-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .badge-booking {
        background-color: #ffc107;
      }
      .badge-contact {
        background-color: #0dcaf0;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-lg">
      <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">
          <img
            src="../static/img/palmstar-logo.png"
            alt="PalmStar Logo"
            loading="lazy"
            class="me-1 brand-logo rounded"
            width="35px"
            height="25px"
          />PalmStar Admin
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Back to Site</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row mb-4">
        <div class="col">
          <h1 class="display-4">Submissions Dashboard</h1>
          <p class="lead">View and manage form submissions</p>
        </div>
        <div class="col-auto">
          <button class="btn btn-danger" onclick="clearAllData()">
            <i class="bi bi-trash"></i> Clear All Data
          </button>
          <button class="btn btn-primary ms-2" onclick="exportData()">
            <i class="bi bi-download"></i> Export Data
          </button>
        </div>
      </div>

      <!-- Statistics -->
      <div class="row mb-4">
        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <h3 class="display-4" id="totalSubmissions">0</h3>
              <p class="text-muted">Total Submissions</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <h3 class="display-4" id="totalBookings">0</h3>
              <p class="text-muted">Booking Requests</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <h3 class="display-4" id="totalContacts">0</h3>
              <p class="text-muted">Contact Forms</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="row mb-4">
        <div class="col-md-6">
          <select
            class="form-select"
            id="filterType"
            onchange="filterSubmissions()"
          >
            <option value="all">All Submissions</option>
            <option value="bookingForm">Bookings Only</option>
            <option value="contactForm">Contact Forms Only</option>
          </select>
        </div>
        <div class="col-md-6">
          <input
            type="text"
            class="form-control"
            id="searchInput"
            placeholder="Search by email or name..."
            oninput="filterSubmissions()"
          />
        </div>
      </div>

      <!-- Submissions List -->
      <div id="submissionsList" class="row"></div>

      <!-- Empty State -->
      <div id="emptyState" class="text-center py-5" style="display: none">
        <i class="bi bi-inbox display-1 text-muted"></i>
        <p class="lead text-muted mt-3">No submissions yet</p>
        <p class="text-muted">
          Form submissions will appear here once users submit forms.
        </p>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>

    <script>
      let allSubmissions = [];

      // Load and display submissions
      function loadSubmissions() {
        allSubmissions =
          JSON.parse(localStorage.getItem("palmstar_submissions")) || [];
        updateStatistics();
        filterSubmissions();
      }

      function updateStatistics() {
        document.getElementById("totalSubmissions").textContent =
          allSubmissions.length;
        document.getElementById("totalBookings").textContent =
          allSubmissions.filter((s) => s.formType === "bookingForm").length;
        document.getElementById("totalContacts").textContent =
          allSubmissions.filter((s) => s.formType === "contactForm").length;
      }

      function filterSubmissions() {
        const filterType = document.getElementById("filterType").value;
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase();

        let filtered = allSubmissions;

        // Filter by type
        if (filterType !== "all") {
          filtered = filtered.filter((s) => s.formType === filterType);
        }

        // Search
        if (searchTerm) {
          filtered = filtered.filter((s) => {
            const email = s.email?.toLowerCase() || "";
            const name = s.name?.toLowerCase() || "";
            return email.includes(searchTerm) || name.includes(searchTerm);
          });
        }

        displaySubmissions(filtered);
      }

      function displaySubmissions(submissions) {
        const container = document.getElementById("submissionsList");
        const emptyState = document.getElementById("emptyState");

        if (submissions.length === 0) {
          container.innerHTML = "";
          emptyState.style.display = "block";
          return;
        }

        emptyState.style.display = "none";
        container.innerHTML = submissions
          .reverse()
          .map(
            (sub, index) => `
          <div class="col-md-6 mb-3">
            <div class="card submission-card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                  <span class="badge ${
                    sub.formType === "bookingForm"
                      ? "badge-booking"
                      : "badge-contact"
                  }">
                    ${sub.formType === "bookingForm" ? "Booking" : "Contact"}
                  </span>
                  <button class="btn btn-sm btn-outline-danger" onclick="deleteSubmission(${
                    allSubmissions.length - 1 - index
                  })">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
                <h6 class="card-title">${sub.name || sub.email || "No name"}</h6>
                <p class="card-text small text-muted">
                  <i class="bi bi-calendar"></i> ${new Date(
                    sub.timestamp,
                  ).toLocaleString()}
                </p>
                ${renderSubmissionDetails(sub)}
              </div>
            </div>
          </div>
        `,
          )
          .join("");
      }

      function renderSubmissionDetails(sub) {
        let details = "";

        if (sub.formType === "bookingForm") {
          details = `
            <hr>
            <p class="mb-1"><strong>Destination:</strong> ${
              sub.destination || "N/A"
            }</p>
            <p class="mb-1"><strong>Check-in:</strong> ${
              sub["checkin-date"] || "N/A"
            }</p>
            <p class="mb-1"><strong>Check-out:</strong> ${
              sub["checkout-date"] || "N/A"
            }</p>
            <p class="mb-1"><strong>Travelers:</strong> ${
              sub.adults || 0
            } adults, ${sub.children || 0} children</p>
            ${sub.budget ? `<p class="mb-1"><strong>Budget:</strong> ${sub.budget}</p>` : ""}
          `;
        } else if (sub.formType === "contactForm") {
          details = `
            <hr>
            <p class="mb-1"><strong>Email:</strong> ${sub.email || "N/A"}</p>
            ${sub.phone ? `<p class="mb-1"><strong>Phone:</strong> ${sub.phone}</p>` : ""}
            <p class="mb-1"><strong>Subject:</strong> ${
              sub.subject || "N/A"
            }</p>
            <p class="mb-1"><strong>Message:</strong> ${
              sub.message || "N/A"
            }</p>
          `;
        }

        return details;
      }

      function deleteSubmission(index) {
        if (confirm("Are you sure you want to delete this submission?")) {
          allSubmissions.splice(index, 1);
          localStorage.setItem(
            "palmstar_submissions",
            JSON.stringify(allSubmissions),
          );
          loadSubmissions();
        }
      }

      function clearAllData() {
        if (
          confirm(
            "Are you sure you want to delete ALL submissions? This cannot be undone.",
          )
        ) {
          localStorage.removeItem("palmstar_submissions");
          loadSubmissions();
        }
      }

      function exportData() {
        const dataStr = JSON.stringify(allSubmissions, null, 2);
        const dataBlob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `palmstar-submissions-${new Date().toISOString().split("T")[0]}.json`;
        link.click();
        URL.revokeObjectURL(url);
      }

      // Load on page load
      loadSubmissions();
    </script>
  </body>
</html>
