<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PalmStar</title>
    <link rel="stylesheet" href="../static/css/styles.css" />
    <link rel="stylesheet" href="../static/css/login.css" />
    <link
      rel="shortcut icon"
      href="../static/img/palmstar-logo.png"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <main class="container-c">
      <header>
        <img
          src="../static/img/palmstar-logo.png"
          alt="Company Logo"
          class="logo text-center"
        />
      </header>
      <section class="tab-container">
        <button class="tab active" onclick="openTab(event, 'login')">
          Login
        </button>
        <button class="tab" onclick="openTab(event, 'signup')">Signup</button>
      </section>
      <section id="login" class="tab-content active">
        <h2 class="text-center fw-bold">Welcome Back</h2>
        <p class="text-center mt-3 mb-4">
          Login to your account to continue exploring our exclusive tours.
        </p>
        <form id="loginForm">
          <div class="form-group">
            <input
              type="email"
              id="loginEmail"
              name="email"
              placeholder="Your Email"
              required
            />
          </div>
          <div class="form-group">
            <input
              type="password"
              id="loginPassword"
              name="password"
              placeholder="Password"
              required
            />
          </div>
          <label for="remember" class="form-check-label">
            <input
              type="checkbox"
              name="remember-me"
              id="remember"
              class="form-check-input"
            />
            Remember Me
          </label>
          <button type="submit">Login</button>
        </form>
      </section>
      <section id="signup" class="tab-content">
        <h2 class="text-center fw-bold">Join the Club</h2>
        <p class="text-center mb-4">
          Sign up for a world of premium tours and exclusive offers.
        </p>
        <form id="signupForm">
          <div class="form-group">
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your Name"
              required
            />
          </div>
          <div class="form-group">
            <input
              type="email"
              id="signupEmail"
              name="email"
              placeholder="Your Email"
              required
            />
          </div>
          <div class="form-group">
            <input
              type="password"
              id="signupPassword"
              name="password"
              placeholder="Password"
              required
            />
          </div>
          <label for="terms" class="form-check-label text-secondary">
            <input
              type="checkbox"
              name="terms"
              id="terms"
              class="form-check-input"
            />
            I accept
            <a href="http://" class="text-decoration-none"
              >terms and conditions</a
            >
          </label>
          <button type="submit">Sign Up</button>
        </form>
      </section>
    </main>

    <script src="../static/js/tabs.js"></script>
    <script src="../static/js/forms.js"></script>
  </body>
</html>
